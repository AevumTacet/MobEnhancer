# replaceHostiles: replaces *SOME* hostile mobs with zombies
replaceHostiles: false

# extraSpawns: spawn extra zombies
extraSpawns: true

# endSpawn: replace 12,5% of endermen with zombies in The End
endSpawn: true

# displayType: show the zombie's type as the zombie's nametag
displayType: false

# disableCombustion: makes Zombies (& any other zombie type) unable to combust/burn.
disableCombustion: false

# zombifiedPiglinAttack: makes Zombified Piglins RANDOMLY attack players without players having to attack them first.
zombifiedPiglinAttack: true

#################################
########### BOSSES ##############
#################################

boss-spawn:
  enabled: true
  min-players: 1
  max-concurrent: 1
  cooldown-minutes: 60      # 1 hora entre spawns naturales
  chance: 0.25              # 25% de probabilidad cuando el cooldown expira
  distance-min: 100
  distance-max: 200
  broadcast-message: "&cA abomination is about to appear at X: %x Y: %y Z: %z!"

bosses:

  putrid_colossus:
    enabled: true
    weight: 10
    # helmet: "minecraft:carved_pumpkin"   # descomenta para sobreescribir el casco por defecto
    drops:
      exp: 200
      items:
        - item: "minecraft:diamond"
          amount: 3
          chance: 1.0
        - item: "minecraft:rotten_flesh"
